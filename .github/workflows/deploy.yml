name: Deploy

on:
  workflow_run:
    workflows: [Build]
    types: [completed]

permissions:
  id-token: write
  contents: read
  actions: read # needed to download the image-tag artifact from the triggering run

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.head_branch == 'develop' ||
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: ${{ github.event.workflow_run.head_branch == 'main' && 'prod' || 'dev' }}
    steps:
      - name: Set environment vars
        id: vars
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [ "$HEAD_BRANCH" = "main" ]; then
            echo "tf_workspace=prod" >> "$GITHUB_OUTPUT"
            echo "gitops_branch=main" >> "$GITHUB_OUTPUT"
            echo "values_file=values-prod.yaml" >> "$GITHUB_OUTPUT"
          else
            echo "tf_workspace=dev" >> "$GITHUB_OUTPUT"
            echo "gitops_branch=develop" >> "$GITHUB_OUTPUT"
            echo "values_file=values-dev.yaml" >> "$GITHUB_OUTPUT"
          fi

      - name: Download image tag artifact from the triggering Build run
        uses: actions/download-artifact@v4
        with:
          name: image-tag
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Read image tag
        id: tag
        run: echo "image_tag=$(cat image_tag.txt)" >> "$GITHUB_OUTPUT"

      - name: Checkout infra repo (read-only, for Terraform outputs)
        uses: actions/checkout@v4
        with:
          repository: ProcurementPlatform/procurement-platform-infra
          path: infra

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Read IRSA role ARNs from Terraform state
        id: tf-outputs
        working-directory: infra
        run: |
          terraform init
          terraform workspace select ${{ steps.vars.outputs.tf_workspace }}
          echo "irsa_arns=$(terraform output -json irsa_role_arns | jq -c .)" >> "$GITHUB_OUTPUT"

      - name: Checkout gitops repo
        uses: actions/checkout@v4
        with:
          repository: ProcurementPlatform/procurement-platform-gitops
          ref: ${{ steps.vars.outputs.gitops_branch }}
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops-repo

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Bump image tag + IRSA annotations
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.image_tag }}
          IRSA_ARNS_JSON: ${{ steps.tf-outputs.outputs.irsa_arns }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          VALUES_FILE: ${{ steps.vars.outputs.values_file }}
        run: |
          REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          VALUES="gitops-repo/helm/procurement-platform/${VALUES_FILE}"

          declare -A REPO=(
            [identity-service]=procurement-identity
            [finance-service]=procurement-finance
            [procurement-service]=procurement-procurement
            [document-service]=procurement-document
            [ai-service]=procurement-ai
            [frontend]=procurement-frontend
          )

          for chart in "${!REPO[@]}"; do
            irsa_arn=$(echo "$IRSA_ARNS_JSON" | jq -r --arg c "$chart" '.[$c] // ""')
            yq -i ".\"$chart\".image.repository = \"$REGISTRY/${REPO[$chart]}\"" "$VALUES"
            yq -i ".\"$chart\".image.tag = \"$IMAGE_TAG\"" "$VALUES"
            if [ -n "$irsa_arn" ]; then
              yq -i ".\"$chart\".serviceAccount.annotations.\"eks.amazonaws.com/role-arn\" = \"$irsa_arn\"" "$VALUES"
            fi
          done

      - name: Commit and push to gitops repo
        working-directory: gitops-repo
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add "helm/procurement-platform/${{ steps.vars.outputs.values_file }}"
          git commit -m "chore: update ${{ steps.vars.outputs.tf_workspace }} image tag to ${{ steps.tag.outputs.image_tag }} [skip ci]" || echo "No changes to commit"
          git push

      - name: Send email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[Procurement Platform] Deploy ${{ job.status }} — ${{ steps.vars.outputs.tf_workspace }}"
          to: ${{ secrets.NOTIFY_TO_EMAIL }}
          from: Procurement Platform CI <${{ secrets.NOTIFY_FROM_EMAIL }}>
          body: |
            Deploy pipeline: ${{ job.status }}
            Environment: ${{ steps.vars.outputs.tf_workspace }}
            Image tag: ${{ steps.tag.outputs.image_tag }}
            Gitops branch updated: ${{ steps.vars.outputs.gitops_branch }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
